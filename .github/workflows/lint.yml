name: lint
on:
  pull_request:
jobs:
  lint:
    strategy:
      matrix:
        go: [1.21, 1.22]
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: "Install golang"
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
      - name: "Run go vet"
        run: "go vet ./pkg/..."
